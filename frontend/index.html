<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #242830;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e8eaf0;
    --muted: #6b7280;
    --danger: #ff5c6c;
    --success: #00d4aa;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image: linear-gradient(rgba(108,99,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
  }
  .glow-1 { background: var(--accent); top: -200px; left: -200px; }
  .glow-2 { background: var(--accent2); bottom: -200px; right: -200px; }

  .card {
    position: relative; z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 440px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.5s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

  .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 32px; }
  .tab {
    flex: 1; text-align: center; padding: 10px;
    border-radius: 8px; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 600;
    font-size: 14px; color: var(--muted);
    transition: all 0.2s;
    border: none; background: transparent;
  }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

  .form-group { margin-bottom: 18px; }
  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 8px; font-weight: 500; }
  input {
    width: 100%; padding: 13px 16px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none; border-radius: 10px;
    color: #fff; font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .alert {
    padding: 12px 16px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
  .alert.error { background: rgba(255,92,108,0.1); border: 1px solid rgba(255,92,108,0.3); color: var(--danger); }
  .alert.success { background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--success); }
  .alert.show { display: block; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<div class="card">
  <div class="logo">TaskFlow</div>
  <div class="tagline">Manage projects, assign tasks, track progress</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password"
        onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn" onclick="doLogin()" id="loginBtn">Login</button>
  </div>

  <!-- Signup Form -->
  <div id="signupForm" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Arpit Narang"/>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Min 6 characters"
        onkeydown="if(event.key==='Enter') doSignup()"/>
    </div>
    <button class="btn" onclick="doSignup()" id="signupBtn">Create Account</button>
  </div>
</div>

<script src="config.js"></script>
<script>
  const API = localStorage.getItem('api_url') || 'http://localhost:8000';

  // Redirect if already logged in
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html';
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='signup'));
    });
    document.getElementById('loginForm').style.display = tab==='login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab==='signup' ? 'block' : 'none';
    showAlert('', '');
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + (msg ? type + ' show' : '');
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showAlert('Please fill all fields', 'error');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Logging in...';
    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Login failed');
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch(e) {
      showAlert(e.message, 'error');
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  async function doSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!name || !email || !password) return showAlert('Please fill all fields', 'error');
    if (password.length < 6) return showAlert('Password must be at least 6 characters', 'error');
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const res = await fetch(`${API}/api/auth/signup`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name, email, password})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Signup failed');
      localStorage.setItem('token', data.access_token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch(e) {
      showAlert(e.message, 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
